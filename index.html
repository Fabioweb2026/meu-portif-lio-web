<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Malta Experience</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Plus Jakarta Sans',sans-serif;

    min-height:100vh;

    background:
    linear-gradient(rgba(0,0,0,0.82),rgba(0,0,0,0.82)),
    url('malta01.jpg.png') center/cover no-repeat;

    color:white;

    display:flex;
    justify-content:center;
    align-items:center;

    text-align:center;

    padding:40px;
}

.container{
    max-width:850px;

    background:rgba(20,20,20,0.85);

    border:1px solid rgba(179,147,89,0.3);

    padding:60px 40px;

    border-radius:24px;

    backdrop-filter:blur(8px);
}

h1{
    font-size:58px;
    color:#b39359;

    margin-bottom:20px;

    letter-spacing:4px;
}

p{
    font-size:18px;
    line-height:1.8;

    color:#dcdcdc;

    margin-bottom:40px;
}

.btn{
    display:inline-block;

    padding:14px 28px;

    border:1px solid #b39359;

    color:white;

    text-decoration:none;

    border-radius:8px;

    transition:0.3s ease;
}

.btn:hover{
    background:#b39359;
    color:black;
}

</style>
</head>

<body>

<div class="container">

    <h1>MALTA</h1>

    <p>
        International modern project integrated into Fabio Web Portfolio.
        Elegant design, premium visual identity and responsive experience.
    </p>

    <a href="index.html" class="btn">
        ← Back to Portfolio
    </a>

</div>

</body>
</html>
