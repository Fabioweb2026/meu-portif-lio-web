<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fabio Web | Portfolio</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        /* 1. FUNDO FIXO */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url('foto.fabio1.jpg');
            background-size: cover; background-position: center; background-attachment: fixed;
            color: #fff; padding: 40px 20px;
            overflow-x: hidden;
        }

        h1 { font-size: 2.2rem; margin-bottom: 40px; text-align: center; color: #b39359; text-transform: uppercase; }

        /* 2. GRID DE PROJETOS */
        .projects-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 25px; max-width: 1200px; width: 100%; }

        .card {
            background: rgba(26, 26, 26, 0.95); width: 350px; border-radius: 25px;
            cursor: pointer; /* Muda para mãozinha de clique */
            border: 1px solid rgba(179, 147, 89, 0.3);
            transition: 0.4s; overflow: hidden; display: flex; flex-direction: column; backdrop-filter: blur(10px);
        }
        .card:hover { transform: translateY(-10px); border-color: #b39359; box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6); }

        .card-banner img { width: 100%; height: auto; display: block; }
        .card-content { padding: 25px; text-align: center; }
        .card h3 { font-size: 1.4rem; color: #b39359; margin-bottom: 10px; }
        .card p { font-size: 0.9rem; color: #ddd; line-height: 1.5; }

        /* 3. O MODAL (A JANELA QUE ABRE POR CIMA) */
        #projectModal {
            display: none; /* Escondido por padrão */
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            justify-content: center; align-items: center;
        }

        .modal-content {
            width: 90%; height: 90%;
            background: white; border-radius: 20px;
            overflow: hidden; position: relative;
            box-shadow: 0 0 30px rgba(179, 147, 89, 0.5);
        }

        /* Botão de fechar a janela */
        .close-btn {
            position: absolute; top: 15px; right: 20px;
            font-size: 30px; color: #000; cursor: pointer;
            font-weight: bold; z-index: 1001;
        }

        iframe { width: 100%; height: 100%; border: none; }

        @media (max-width: 768px) { .card { width: 100%; } }
    </style>
</head>
<body>

    <h1>Web Portfolio</h1>

    <div class="projects-grid">
        <!-- CARD SOLLENE: Agora chama a função de abrir janela -->
        <div class="card" onclick="openProject('estoque.html')">
            <div class="card-banner">
                <img src="imagem.Sollene%20Group.png" alt="Sollene">
            </div>
            <div class="card-content">
                <h3>Sollene Group</h3>
                <p>International inventory system. Click to open inside the portfolio.</p>
            </div>
        </div>

        <!-- CARD MALTA -->
        <div class="card" onclick="openProject('malta.html')">
            <div class="card-content">
               <span style="font-size:60px;">🌍</span>
               <h3>Malta Project</h3>
               <p>Business gallery and premium logistics.</p>
            </div>
        </div>
    </div>

    <!-- ESTRUTURA DA JANELA (MODAL) -->
    <div id="projectModal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeProject()">&times;</span>
            <iframe src="" id="projectFrame"></iframe>
        </div>
    </div>

    <script>
        // Função para abrir o projeto por cima do fundo
        function openProject(url) {
            document.getElementById('projectFrame').src = url;
            document.getElementById('projectModal').style.display = 'flex';
            document.body.style.overflow = 'hidden'; // Trava o fundo
        }

        // Função para fechar e voltar para a foto de fundo
        function closeProject() {
            document.getElementById('projectModal').style.display = 'none';
            document.getElementById('projectFrame').src = '';
            document.body.style.overflow = 'auto'; // Destrava o fundo
        }

        // Fecha se clicar fora da janela branca
        window.onclick = function(event) {
            if (event.target == document.getElementById('projectModal')) {
                closeProject();
            }
        }
    </script>

</body>
</html>
