<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter - Fábio Dev</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #11998e, #38ef7d); min-height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 90%; max-width: 350px; text-align: center; color: #333; }
        #result { font-size: 2rem; font-weight: bold; color: #11998e; margin: 15px 0; }
        input { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 8px; box-sizing: border-box; margin-bottom: 15px; }
        button { width: 100%; padding: 14px; background: #11998e; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h2>💱 EUR to BRL</h2>
        <p style="font-size: 0.8rem; color: #666;">Fixed Rate: 1€ = R$ 5.50</p>
        <div id="result">R$ 0.00</div>
        <input type="number" id="euroInput" placeholder="Amount in Euro (€)">
        <button onclick="convert()">Convert Now</button>
        <a href="index.html" style="display:block; margin-top:20px; font-size:12px; color:#11998e; text-decoration:none;">← Back to Portfolio</a>
    </div>
    <script>
        function convert() {
            const euro = parseFloat(document.getElementById('euroInput').value) || 0;
            document.getElementById('result').innerText = `R$ ${(euro * 5.5).toFixed(2)}`;
        }
    </script>
</body>
</html>
