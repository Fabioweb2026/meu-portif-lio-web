<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Master - Fábio Dev</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea, #764ba2); min-height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
        .todo-container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 90%; max-width: 400px; text-align: center; color: #333; }
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; padding: 12px; border: 2px solid #eee; border-radius: 8px; outline: none; }
        .btn-add { background: #764ba2; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        ul { list-style: none; padding: 0; text-align: left; }
        /* Estilo das tarefas que vão aparecer */
        li { background: #f8f9fa; margin-bottom: 10px; padding: 12px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid #764ba2; }
        .btn-del { background: #ff4757; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="todo-container">
        <h2>✅ Task Master</h2>
        <div class="input-group">
            <input type="text" id="taskInput" placeholder="Write a new task...">
            <button class="btn-add" onclick="addTask()">Add</button>
        </div>
        
        <!-- AQUI É ONDE AS TAREFAS VÃO APARECER -->
        <ul id="taskList">
            <li>Welcome! Try adding a task below. <button class="btn-del" onclick="this.parentElement.remove()">X</button></li>
            <li>Study JavaScript on freeCodeCamp <button class="btn-del" onclick="this.parentElement.remove()">X</button></li>
        </ul>
    </div>

    <script>
        function addTask() {
            const input = document.getElementById('taskInput');
            const taskText = input.value;
            if (taskText.trim() === '') return;

            const li = document.createElement('li');
            li.innerHTML = `${taskText} <button class="btn-del" onclick="this.parentElement.remove()">X</button>`;
            document.getElementById('taskList').appendChild(li);
            input.value = '';
            input.focus();
        }
    </script>

</body>
</html>
