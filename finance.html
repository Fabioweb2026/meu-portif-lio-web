<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Tracker - Fábio Dev</title>
    <style>
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: linear-gradient(135deg, #1e3c72, #2a5298); 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            margin: 0; 
            color: #333; 
        }
        .container { 
            background: white; 
            padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); 
            width: 90%; 
            max-width: 350px; 
            text-align: center; 
        }
        .balance-box { 
            background: #f8f9fa; 
            padding: 20px; 
            border-radius: 10px; 
            margin-bottom: 20px; 
            border: 1px solid #ddd;
        }
        #balance { 
            font-size: 2.2rem; 
            font-weight: bold; 
            color: #27ae60; 
        }
        .input-group { 
            margin-bottom: 15px; 
            text-align: left; 
        }
        label { 
            display: block; 
            font-size: 0.85rem; 
            margin-bottom: 5px; 
            font-weight: bold; 
        }
        input { 
            width: 100%; 
            padding: 12px; 
            border: 2px solid #eee; 
            border-radius: 8px; 
            box-sizing: border-box; 
        }
        button { 
            width: 100%; 
            padding: 14px; 
            background: #1e3c72; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            margin-top: 10px; 
        }
        .positive { color: #27ae60 !important; }
        .negative { color: #e74c3c !important; }
    </style>
</head>
<body>

    <div class="container">
        <h2>💰 Finance Tracker</h2>
        
        <div class="balance-box">
            <p style="margin:0; color: #666;">Total Balance</p>
            <div id="balance">$ 0.00</div>
        </div>

        <div class="input-group">
            <label>Income</label>
            <input type="number" id="incomeInput" placeholder="0.00">
        </div>

        <div class="input-group">
            <label>Expenses</label>
            <input type="number" id="expenseInput" placeholder="0.00">
        </div>

        <button onclick="calculateFinance()">Calculate Now</button>
        <br>
        <a href="index.html" style="display:block; margin-top:20px; font-size:12px; color:#1e3c72; text-decoration:none;">← Back to Portfolio</a>
    </div>

    <script>
        function calculateFinance() {
            const income = parseFloat(document.getElementById('incomeInput').value) || 0;
            const expense = parseFloat(document.getElementById('expenseInput').value) || 0;
            const total = income - expense;

            const balanceDisplay = document.getElementById('balance');
            balanceDisplay.innerText = `$ ${total.toFixed(2)}`;

            if (total >= 0) {
                balanceDisplay.className = 'positive';
            } else {
                balanceDisplay.className = 'negative';
            }
        }
    </script>

</body>
</html>
